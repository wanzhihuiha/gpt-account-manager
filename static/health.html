<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPT账号管理助手 - 部署自检</title>
  <link rel="stylesheet" href="/styles.css?v=20260603-dashboard-stats">
  <link rel="stylesheet" href="/forge-theme.css?v=20260531-open-source-links">
  <script src="/nav-links.js?v=20260531-docker-dns-links" defer></script>
  <script src="/i18n.js?v=20260603-dashboard-stats" defer></script>
</head>
<body>
  <div class="shell">
    <header class="topbar app-header">
      <a class="brand" href="/" aria-label="GPT账号管理助手">
        <span class="brand-mark" aria-hidden="true">OK</span>
        <span class="brand-copy">
          <strong>部署自检</strong>
          <em>版本 · 配置 · 数据计数 · 服务状态</em>
        </span>
      </a>
      <nav class="topnav" aria-label="顶部导航">
        <a href="/">账号管理</a>
        <a href="/dashboard.html">仪表盘</a>
        <a href="/refresh.html">凭证刷新</a>
        <a href="/warehouse.html">CPA 仓管</a>
      </nav>
    </header>

    <main class="health-grid">
      <section class="panel health-hero">
        <div>
          <p class="eyebrow">Health</p>
          <h1 id="healthTitle">读取中</h1>
          <p id="healthSub">正在检查当前服务版本和运行配置。</p>
        </div>
        <button id="reloadHealth" class="primary" type="button">重新检测</button>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>核心状态</h2>
          <span id="healthBadge" class="status-pill">-</span>
        </div>
        <div id="coreGrid" class="health-kv"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>功能配置</h2>
          <span>不显示密钥</span>
        </div>
        <div id="featureGrid" class="health-kv"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>数据计数</h2>
          <span>服务端文件</span>
        </div>
        <div id="dataGrid" class="health-kv"></div>
      </section>

      <section class="panel upgrade-panel">
        <div class="section-head">
          <h2>同步升级</h2>
          <span id="upgradeBadge">等待检测</span>
        </div>
        <p class="upgrade-copy">点击后会写入升级请求；宿主机 upgrade agent 会执行 git pull、重建 Docker 并重启服务。</p>
        <div class="upgrade-actions">
          <button id="checkUpgrade" type="button">刷新状态</button>
          <button id="requestUpgrade" class="primary" type="button">请求升级并重启</button>
        </div>
        <pre id="upgradeStatus">{}</pre>
      </section>

      <section class="panel health-raw">
        <div class="section-head">
          <h2>原始 JSON</h2>
          <span>/health</span>
        </div>
        <pre id="rawHealth">{}</pre>
      </section>
    </main>
  </div>

  <script>
    const els = {
      title: document.querySelector("#healthTitle"),
      sub: document.querySelector("#healthSub"),
      badge: document.querySelector("#healthBadge"),
      core: document.querySelector("#coreGrid"),
      features: document.querySelector("#featureGrid"),
      data: document.querySelector("#dataGrid"),
      raw: document.querySelector("#rawHealth"),
      reload: document.querySelector("#reloadHealth"),
      upgradeBadge: document.querySelector("#upgradeBadge"),
      upgradeStatus: document.querySelector("#upgradeStatus"),
      checkUpgrade: document.querySelector("#checkUpgrade"),
      requestUpgrade: document.querySelector("#requestUpgrade"),
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function kv(rows) {
      return rows.map(([key, value]) => `
        <div class="health-item">
          <span>${escapeHtml(key)}</span>
          <strong>${escapeHtml(value)}</strong>
        </div>
      `).join("");
    }

    async function loadHealth() {
      els.title.textContent = "读取中";
      els.badge.textContent = "-";
      const [payload, network] = await Promise.all([
        readJsonEndpoint("/health"),
        readJsonEndpoint("/network-health"),
      ]);
      els.raw.textContent = JSON.stringify({ health: payload, network }, null, 2);
      els.title.textContent = payload.ok ? "服务正常" : "服务异常";
      els.sub.textContent = `${payload.app || "-"} · ${payload.version || "-"} · ${payload.started_at || "-"}`;
      els.badge.textContent = payload.version || "-";
      els.core.innerHTML = kv([
        ["版本", payload.version],
        ["启动时间", payload.started_at],
        ["当前时间", payload.now],
        ["监听", `${payload.host}:${payload.port}`],
        ["管理令牌", payload.admin_token_set ? "已设置" : "未设置"],
      ]);
      els.features.innerHTML = kv([
        ["临时邮箱 API", payload.urls?.temp_worker],
        ["取信网络", network.ok ? "正常" : "DNS/网络异常"],
        ["公共池地址", payload.urls?.public_pool],
        ["公益池 API", payload.features?.public_pool_api ? "已配置" : "未配置"],
        ["CPA 内网远程", payload.features?.cpa_private_remote_allowed ? "允许" : "关闭"],
        ["刷新链路", "协议登录"],
      ]);
      els.data.innerHTML = kv([
        ["Outlook 账号", payload.data_counts?.microsoft_accounts],
        ["临时邮箱", payload.data_counts?.temp_addresses],
        ["邮件缓存", payload.data_counts?.messages],
        ["数据目录", payload.paths?.data],
      ]);
      await loadUpgradeStatus();
    }

    function renderUpgrade(payload) {
      const request = payload.request || {};
      const result = payload.result || {};
      const status = result.status || request.status || "idle";
      els.upgradeBadge.textContent = status === "success"
        ? "已升级"
        : status === "requested"
          ? "已请求"
          : status === "running"
            ? "升级中"
            : status === "failed"
              ? "失败"
              : status === "no_update"
                ? "已是最新"
                : "待命";
      els.upgradeStatus.textContent = JSON.stringify(payload, null, 2);
    }

    async function loadUpgradeStatus() {
      const payload = await readJsonEndpoint("/admin-api/upgrade/status");
      renderUpgrade(payload);
      return payload;
    }

    function healthAuthHeaders() {
      const token = new URLSearchParams(window.location.search).get("token") || localStorage.getItem("ctgptm.admin.toolToken") || "";
      if (token) localStorage.setItem("ctgptm.admin.toolToken", token);
      return token ? { Authorization: `Bearer ${token}` } : {};
    }

    async function readJsonEndpoint(path) {
      const response = await fetch(`${path}?t=${Date.now()}`, {
        cache: "no-store",
        headers: healthAuthHeaders(),
      });
      const contentType = response.headers.get("content-type") || "";
      const text = await response.text();
      if (!contentType.includes("application/json")) {
        throw new Error(`${path} 返回了 ${contentType || "非 JSON"}，当前线上可能还是旧包，或 Nginx 把接口转到了前端页面：${text.replace(/\s+/g, " ").slice(0, 160)}`);
      }
      return JSON.parse(text || "{}");
    }

    async function postJsonEndpoint(path, payload = {}) {
      const response = await fetch(path, {
        method: "POST",
        cache: "no-store",
        headers: {
          ...healthAuthHeaders(),
          "Content-Type": "application/json",
        },
        body: JSON.stringify(payload),
      });
      const text = await response.text();
      if (!response.ok) {
        throw new Error(text.replace(/\s+/g, " ").slice(0, 220) || response.statusText);
      }
      return JSON.parse(text || "{}");
    }

    els.checkUpgrade.addEventListener("click", () => loadUpgradeStatus().catch((error) => {
      els.upgradeBadge.textContent = "检测失败";
      els.upgradeStatus.textContent = error.message || "无法读取升级状态";
    }));

    els.requestUpgrade.addEventListener("click", async () => {
      if (!confirm("确认请求升级并重启？升级 agent 会在宿主机执行 git pull 和 docker compose 重建。")) return;
      els.requestUpgrade.disabled = true;
      els.requestUpgrade.textContent = "已提交";
      try {
        const payload = await postJsonEndpoint("/admin-api/upgrade/request", { target: "origin/main" });
        renderUpgrade(payload.status || payload);
      } catch (error) {
        els.upgradeBadge.textContent = "提交失败";
        els.upgradeStatus.textContent = error.message || "升级请求失败";
      } finally {
        setTimeout(() => {
          els.requestUpgrade.disabled = false;
          els.requestUpgrade.textContent = "请求升级并重启";
        }, 1600);
      }
    });

    els.reload.addEventListener("click", () => loadHealth().catch((error) => {
      els.title.textContent = "检测失败";
      els.sub.textContent = error.message || "无法读取 /health";
      els.badge.textContent = "error";
    }));
    loadHealth().catch((error) => {
      els.title.textContent = "检测失败";
      els.sub.textContent = error.message || "无法读取 /health";
      els.badge.textContent = "error";
    });
  </script>
</body>
</html>
